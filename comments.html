<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rainbow Six Siege Operator Guide - Comment Section</title>
    <meta charset="UTF-8">
    <meta name="description" content="Join the Rainbow Six Siege community hub: Engage with passionate players, share strategies, participate in discussions, and stay connected with Siege enthusiasts around the world.">
    <meta name="keywords" content="Rainbow Six Siege community, R6 forums, Siege Discussions, gameplay tips, player meetups, gameplay tips, player meetups, stategy sharing, Siege clans, operator debates, Siege events, eSports fans, R6 player network.">
    <meta name="author" content="Brandon Mihalko">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="Rainbow-Six.css" rel="stylesheet">

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Select the form
            var form = document.getElementById("commentForm");

            // Add an event listener to the form
            form.addEventListener("keydown", function (event) {
                // Check if the Enter key is pressed (key code 13)
                if (event.keyCode === 13) {
                    // Prevent the default form submission
                    event.preventDefault();

                    // Trigger the form submission
                    form.submit();
                }
            });
        });
    </script>

    <style>
        main {
            background-color: white;
            width: 680px;
            height: 265px;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 437px;
            margin-top: 153px;
        }

        .new-comment {
            color: black;
            font-size: 30px;
            font-weight: bold;
            font-style: italic;
            padding-left: 14px;
            box-shadow: 0 1px 10px;
        }

        .name {
            display: flex;
            justify-content: center;
            color: black;
            font-weight: bold;
            margin-bottom: 17px;
            font-style: italic;
        }

        .comment {
            display: flex;
            justify-content: center;
            color: black; 
            font-weight: bold;
            font-style: italic;
        }

    </style>


</head>
<body>
    <header>
        <div class="headerDiv">
            <nav>
                <ul>
                    <li id="homePagelogo"><a href="index.html"><img src="Images/r6s-y6-logo.webp" alt="Rainbow Six Siege Logo" width="225" height="40"></a></li>
                    <li id="operatorsPage"><a href="operators.html">Operators</a></li>
                    <li id="communityPage"><a href="comments.html">Community Page</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
            <form id="commentForm" action="https://wp.zybooks.com/form-viewer.php" target="_blank" method="POST">
                <p style="color: black; font-size: 30px; font-weight: bold; font-style: italic; padding-left: 14px; box-shadow: 0 1px 10px;">New Comment</p>
                <div class="name">
                    <label style="margin-right: 96px; font-size: 30px;" for="userName">Name:</label>
                    <textarea style="font-size: 23px; margin-top: 5px;" id="userName" name="userName" placeholder="Enter Username . . ." rows="1" cols="30"></textarea>
                </div>
                <div class="comment">
                    <label style="margin-right: 40px; font-size: 30px;" for="userComment">Comment:</label>
                    <textarea style="font-size: 23px;" id="userComment" name="userComment" placeholder="Enter New Comment . . ." rows="3" cols="30"></textarea>
                </div>
                <input style="margin-left: 90px; padding: 5px;" type="submit" value="Submit">
            </form>
        </main>
        <footer>
            <div>
                <nav>
                    <ul>
                        <li id="instagramLogo"><a href="https://www.instagram.com/ubisoft/"><img src="Images/Instagram-logo.png" alt="Intagram Logo" width="56" height="56"></a></li>
                        <li id="twitterLogo"><a href="https://twitter.com/Ubisoft?ref_src=twsrc%5Egoogle%7Ctwcamp%5Eserp%7Ctwgr%5Eauthor"><img src="Images/twitter-logo.png" alt="Twitter Logo" width="70" height="58"></a></li>
                        <li id="contact">Contact Me: brandonmihalko@gmail.com</li>
                        <li id="gameInfo"><a href="https://www.ubisoft.com/en-us/game/rainbow-six/siege/game-info/operators">More Operator Info</a></li>
                    </ul>
                </nav>
            </div>
        </footer>
    </body>

</html>
